# =============================================================================
# Nexus — Docker Compose
# =============================================================================

version: "3.8"

services:
  nexus:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nexus
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../config:/app/config
    restart: unless-stopped

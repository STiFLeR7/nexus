# =============================================================================
# Nexus Core CI — engineering quality gate for the `nexus_core` foundation
# =============================================================================
# Enforces lint, format, strict typing, tests + coverage, and build integrity
# for the Phase 1 platform foundation. The legacy v1 `nexus/` package is covered
# separately by `ci.yml`. No deployment steps live here by design.
# =============================================================================

name: Core CI

on:
  push:
    branches: [master, "v*-planning"]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: core-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check nexus_core nexus_infra nexus_planning nexus_context nexus_orchestration nexus_harness nexus_runtime nexus_execution nexus_runtime_claude nexus_runtime_gemini nexus_runtime_shell nexus_runtime_adapters nexus_validation nexus_recovery nexus_reflection nexus_knowledge nexus_workflows nexus_research nexus_briefings nexus_operator tests/unit/nexus_core tests/unit/nexus_infra tests/unit/nexus_planning tests/unit/nexus_context tests/unit/nexus_orchestration tests/unit/nexus_harness tests/unit/nexus_runtime tests/unit/nexus_execution tests/unit/nexus_runtime_claude tests/unit/nexus_runtime_gemini tests/unit/nexus_runtime_shell tests/unit/nexus_runtime_adapters tests/unit/nexus_validation tests/unit/nexus_recovery tests/unit/nexus_reflection tests/unit/nexus_knowledge tests/unit/nexus_workflows tests/unit/nexus_research tests/unit/nexus_briefings tests/unit/nexus_operator tests/integration
      - name: Ruff format check
        run: uv run ruff format --check nexus_core nexus_infra nexus_planning nexus_context nexus_orchestration nexus_harness nexus_runtime nexus_execution nexus_runtime_claude nexus_runtime_gemini nexus_runtime_shell nexus_runtime_adapters nexus_validation nexus_recovery nexus_reflection nexus_knowledge nexus_workflows nexus_research nexus_briefings nexus_operator tests/unit/nexus_core tests/unit/nexus_infra tests/unit/nexus_planning tests/unit/nexus_context tests/unit/nexus_orchestration tests/unit/nexus_harness tests/unit/nexus_runtime tests/unit/nexus_execution tests/unit/nexus_runtime_claude tests/unit/nexus_runtime_gemini tests/unit/nexus_runtime_shell tests/unit/nexus_runtime_adapters tests/unit/nexus_validation tests/unit/nexus_recovery tests/unit/nexus_reflection tests/unit/nexus_knowledge tests/unit/nexus_workflows tests/unit/nexus_research tests/unit/nexus_briefings tests/unit/nexus_operator tests/integration

  typecheck:
    name: MyPy (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: MyPy strict
        run: uv run mypy nexus_core nexus_infra nexus_planning nexus_context nexus_orchestration nexus_harness nexus_runtime nexus_execution nexus_runtime_claude nexus_runtime_gemini nexus_runtime_shell nexus_runtime_adapters nexus_validation nexus_recovery nexus_reflection nexus_knowledge nexus_workflows nexus_research nexus_briefings nexus_operator

  test:
    name: PyTest + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run tests with coverage gate
        run: >
          uv run pytest tests/unit/nexus_core tests/unit/nexus_infra tests/unit/nexus_planning tests/unit/nexus_context tests/unit/nexus_orchestration tests/unit/nexus_harness tests/unit/nexus_runtime tests/unit/nexus_execution tests/unit/nexus_runtime_claude tests/unit/nexus_runtime_gemini tests/unit/nexus_runtime_shell tests/unit/nexus_runtime_adapters tests/unit/nexus_validation tests/unit/nexus_recovery tests/unit/nexus_reflection tests/unit/nexus_knowledge tests/unit/nexus_workflows tests/unit/nexus_research tests/unit/nexus_briefings tests/unit/nexus_operator tests/integration
          --cov=nexus_core
          --cov=nexus_infra
          --cov=nexus_planning
          --cov=nexus_context
          --cov=nexus_orchestration
          --cov=nexus_harness
          --cov=nexus_runtime
          --cov=nexus_execution
          --cov=nexus_runtime_claude
          --cov=nexus_runtime_gemini
          --cov=nexus_runtime_shell
          --cov=nexus_runtime_adapters
          --cov=nexus_validation
          --cov=nexus_recovery
          --cov=nexus_reflection
          --cov=nexus_knowledge
          --cov=nexus_workflows
          --cov=nexus_research
          --cov=nexus_briefings
          --cov=nexus_operator
          --cov-report=term-missing
          --cov-report=xml
          --cov-report=html
          --cov-fail-under=95
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

  build:
    name: Build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

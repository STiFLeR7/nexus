# Alembic Configuration for Nexus
# =============================================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Prepend the project root to sys.path so nexus package is importable
prepend_sys_path = .

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path prepending for timezone-aware revision IDs
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .hierarchies to be traversed
# sourceless = false

# Version location specification
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Version path separator — use 'os' for os.pathsep, or provide literal separator
# version_path_separator = os

# Output encoding used when revision files are written
# output_encoding = utf-8

# Database URL — async SQLite via aiosqlite
sqlalchemy.url = sqlite+aiosqlite:///./data/nexus.db


[post_write_hooks]
# Post-write hooks run after a new revision is generated.
# Uncomment below to auto-format with ruff after generating migrations:
# hooks = ruff_format, ruff_lint
# ruff_format.type = exec
# ruff_format.executable = ruff
# ruff_format.options = format REVISION_SCRIPT_FILENAME
# ruff_lint.type = exec
# ruff_lint.executable = ruff
# ruff_lint.options = check --fix REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
